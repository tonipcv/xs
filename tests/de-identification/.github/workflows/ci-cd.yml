name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ created ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/deidentification

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        cd tests/de-identification
        npm ci
        
    - name: Run linter
      run: |
        cd tests/de-identification
        npm run lint || true
        
    - name: Run unit tests
      run: |
        cd tests/de-identification
        npm run test:all
        
    - name: Run integration tests
      run: |
        cd tests/de-identification
        npx ts-node src/full-integration-test.ts
        
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: tests/de-identification/output/
        
    - name: Check quality gates
      run: |
        cd tests/de-identification
        REDACTION_RATE=$(jq -r '.summary.overallRedactionRate' output/full-integration-report.json)
        INTEGRITY_RATE=$(jq -r '.summary.overallIntegrityRate' output/full-integration-report.json)
        
        if (( $(echo "$REDACTION_RATE < 95" | bc -l) )); then
          echo "❌ Redaction rate below 95%: $REDACTION_RATE%"
          exit 1
        fi
        
        if (( $(echo "$INTEGRITY_RATE < 90" | bc -l) )); then
          echo "❌ Integrity rate below 90%: $INTEGRITY_RATE%"
          exit 1
        fi
        
        echo "✅ Quality gates passed"
        echo "   Redaction rate: $REDACTION_RATE%"
        echo "   Integrity rate: $INTEGRITY_RATE%"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Run npm audit
      run: |
        cd tests/de-identification
        npm audit --audit-level=moderate || true
        
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [ test, security-scan ]
    if: github.event_name == 'push' || github.event_name == 'release'
    
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: tests/de-identification
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          VCS_REF=${{ github.sha }}
          VERSION=${{ steps.meta.outputs.version }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging-deidentification.xase.ai
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
        
    - name: Deploy to Kubernetes
      run: |
        cd tests/de-identification/k8s
        kubectl apply -f deployment.yaml
        kubectl set image deployment/xase-deidentification \
          deidentification=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop \
          -n xase-deidentification
        kubectl rollout status deployment/xase-deidentification -n xase-deidentification
        
    - name: Run smoke tests
      run: |
        sleep 30
        curl -f https://staging-deidentification.xase.ai/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://deidentification.xase.ai
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
        
    - name: Deploy to Kubernetes
      run: |
        cd tests/de-identification/k8s
        kubectl apply -f deployment.yaml
        kubectl set image deployment/xase-deidentification \
          deidentification=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }} \
          -n xase-deidentification
        kubectl rollout status deployment/xase-deidentification -n xase-deidentification
        
    - name: Run smoke tests
      run: |
        sleep 30
        curl -f https://deidentification.xase.ai/health || exit 1
        
    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Production deployment completed: ${{ github.event.release.tag_name }}'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: always()

  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        cd tests/de-identification
        npm ci
        
    - name: Run performance benchmarks
      run: |
        cd tests/de-identification
        npx ts-node src/performance-benchmark.ts
        
    - name: Check performance thresholds
      run: |
        cd tests/de-identification
        THROUGHPUT=$(jq -r '.throughput.average' output/performance-benchmark.json)
        
        if (( $(echo "$THROUGHPUT < 1" | bc -l) )); then
          echo "⚠️ Throughput below 1 MB/s: $THROUGHPUT MB/s"
          exit 1
        fi
        
        echo "✅ Performance acceptable: $THROUGHPUT MB/s"

apiVersion: v1
kind: Namespace
metadata:
  name: xase-deidentification
  labels:
    name: xase-deidentification
    environment: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: deidentification-config
  namespace: xase-deidentification
data:
  CONCURRENCY: "8"
  MIN_REDACTION_RATE: "95"
  MAX_VALIDATION_FAILURE_RATE: "5"
  LOG_LEVEL: "info"
  ENABLE_MONITORING: "true"

---
apiVersion: v1
kind: Secret
metadata:
  name: deidentification-secrets
  namespace: xase-deidentification
type: Opaque
stringData:
  API_KEY: "change-me-in-production"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin123"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xase-deidentification
  namespace: xase-deidentification
  labels:
    app: xase-deidentification
    version: v2.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: xase-deidentification
  template:
    metadata:
      labels:
        app: xase-deidentification
        version: v2.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: xase-deidentification
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: deidentification
        image: xase/deidentification:2.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: "production"
        envFrom:
        - configMapRef:
            name: deidentification-config
        - secretRef:
            name: deidentification-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
          readOnly: true
        - name: output
          mountPath: /app/output
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: deidentification-data-pvc
      - name: output
        persistentVolumeClaim:
          claimName: deidentification-output-pvc
      - name: logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: xase-deidentification
  namespace: xase-deidentification
  labels:
    app: xase-deidentification
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: xase-deidentification

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: xase-deidentification
  namespace: xase-deidentification

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: deidentification-data-pvc
  namespace: xase-deidentification
spec:
  accessModes:
  - ReadOnlyMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: deidentification-output-pvc
  namespace: xase-deidentification
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: xase-deidentification-hpa
  namespace: xase-deidentification
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: xase-deidentification
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: xase-deidentification-pdb
  namespace: xase-deidentification
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: xase-deidentification

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xase-deidentification
  namespace: xase-deidentification
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - deidentification.xase.ai
    secretName: deidentification-tls
  rules:
  - host: deidentification.xase.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: xase-deidentification
            port:
              number: 80

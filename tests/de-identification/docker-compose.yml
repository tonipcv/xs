version: '3.8'

services:
  # Scenario A & D: MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: deidentification-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Scenario B & D: Orthanc (DICOMweb PACS)
  orthanc:
    image: jodogne/orthanc-plugins:latest
    container_name: deidentification-orthanc
    ports:
      - "4242:4242"  # DICOM protocol
      - "8042:8042"  # HTTP/DICOMweb
    environment:
      ORTHANC_NAME: "Deidentification Test PACS"
      ORTHANC_AET: "TESTPACS"
      ORTHANC_USERNAME: orthanc
      ORTHANC_PASSWORD: orthanc123
    volumes:
      - orthanc-data:/var/lib/orthanc/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8042/system"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Scenario C & D: HAPI FHIR Server
  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: deidentification-hapi-fhir
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      HAPI_FHIR_FHIR_VERSION: R4
      HAPI_FHIR_SUBSCRIPTION_RESTHOOK_ENABLED: "false"
      HAPI_FHIR_SUBSCRIPTION_EMAIL_ENABLED: "false"
      HAPI_FHIR_SUBSCRIPTION_WEBSOCKET_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # PostgreSQL for HAPI FHIR (optional, for persistent storage)
  postgres:
    image: postgres:14-alpine
    container_name: deidentification-postgres
    environment:
      POSTGRES_DB: hapi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio-data:
  orthanc-data:
  postgres-data:

networks:
  default:
    name: deidentification-network

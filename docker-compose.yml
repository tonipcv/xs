version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: xase-postgres
    environment:
      POSTGRES_USER: xase
      POSTGRES_PASSWORD: xase_dev_password
      POSTGRES_DB: xase_sheets
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xase"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xase-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: xase-redis
    command: redis-server --requirepass xase_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xase-network

  # XASE Sheets API
  api:
    build:
      context: .
      dockerfile: Dockerfile.optimized
    container_name: xase-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://xase:xase_dev_password@postgres:5432/xase_sheets
      REDIS_URL: redis://:xase_redis_password@redis:6379
      NEXTAUTH_SECRET: dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-noreply@xase.ai}
      AUDIT_SIGNING_KEY: ${AUDIT_SIGNING_KEY:-dev-signing-key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./prisma:/app/prisma
    networks:
      - xase-network
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npm run dev"

  # Sidecar (Rust)
  sidecar:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: xase-sidecar
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info
      DATABASE_URL: postgresql://xase:xase_dev_password@postgres:5432/xase_sheets
      REDIS_URL: redis://:xase_redis_password@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - sidecar_data:/data
    networks:
      - xase-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: xase-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - sidecar
    networks:
      - xase-network

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: xase-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - xase-network

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: xase-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - xase-network

  # pgAdmin (Database Management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: xase-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@xase.ai
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - xase-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  sidecar_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  xase-network:
    driver: bridge

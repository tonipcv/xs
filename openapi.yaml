openapi: 3.0.3
info:
  title: Xase API
  description: |
    Xase - The Trust Layer for the AI Economy
    
    Secure, compliant, and privacy-preserving data access for AI training.
    
    ## Features
    - Policy-based access control
    - Privacy toolkit (k-anonymity, differential privacy, PII detection)
    - Federated query engine
    - JIT and break-glass access
    - Multi-factor authentication
    - Comprehensive audit trail
    
  version: 1.0.0
  contact:
    name: Xase Support
    email: support@xase.ai
    url: https://xase.ai
  license:
    name: Proprietary
    url: https://xase.ai/license

servers:
  - url: https://api.xase.ai
    description: Production
  - url: https://staging-api.xase.ai
    description: Staging
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
    description: Health check endpoints
  - name: Datasets
    description: Dataset management
  - name: Leases
    description: Access lease management
  - name: Policies
    description: Policy validation and management
  - name: Privacy
    description: Privacy analysis and PII detection
  - name: Federated
    description: Federated query execution
  - name: Auth
    description: Authentication and authorization
  - name: JIT Access
    description: Just-in-time access provisioning
  - name: Break-glass
    description: Emergency access
  - name: Billing
    description: Billing and invoicing
  - name: Compliance
    description: GDPR and regulatory compliance
  - name: Integrations
    description: Cloud storage integrations
  - name: Audit
    description: Audit log management
  - name: Analytics
    description: Analytics and metrics
  - name: Consent
    description: Consent management
  - name: Evidence
    description: Evidence bundles
  - name: GraphQL
    description: GraphQL API
  - name: Marketplace
    description: Data marketplace and offers
  - name: Notifications
    description: User notifications
  - name: Webhooks
    description: Webhook management
  - name: Usage
    description: Usage tracking and reporting
  - name: Tenants
    description: Tenant management
  - name: Users
    description: User management
  - name: OAuth
    description: OAuth2 and OIDC flows
  - name: Executions
    description: Workflow execution management
  - name: Ingestion
    description: Data ingestion pipelines
  - name: Watermarking
    description: Digital watermarking for datasets
  - name: Teams
    description: Team and role management
  - name: HIPAA
    description: HIPAA compliance endpoints
  - name: LGPD
    description: LGPD compliance (Brazil)
  - name: FCA
    description: FCA compliance (UK Financial)
  - name: BaFin
    description: BaFin compliance (Germany Financial)
  - name: CLI
    description: CLI authentication and operations

security:
  - ApiKeyAuth: []
  - BearerAuth: []
  - OAuth2: []

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      description: Check API health status
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /api/v1/datasets:
    get:
      tags: [Datasets]
      summary: List datasets
      description: Get list of available datasets
      parameters:
        - name: tenantId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of datasets
          content:
            application/json:
              schema:
                type: object
                properties:
                  datasets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dataset'
                  total:
                    type: integer

  /api/v1/datasets/{datasetId}/stream:
    get:
      tags: [Datasets]
      summary: Stream dataset
      description: Stream dataset with policy enforcement
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
        - name: leaseId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Streaming response
          content:
            application/x-ndjson:
              schema:
                type: object

  /api/v1/leases:
    get:
      tags: [Leases]
      summary: List leases
      description: Get list of access leases
      responses:
        '200':
          description: List of leases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Lease'
    
    post:
      tags: [Leases]
      summary: Create lease
      description: Mint new access lease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaseRequest'
      responses:
        '201':
          description: Lease created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lease'

  /api/v1/policies/validate:
    post:
      tags: [Policies]
      summary: Validate policy
      description: Validate YAML policy
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: |
                apiVersion: xase.ai/v1
                kind: DataAccessPolicy
                metadata:
                  name: healthcare-training
                spec:
                  dataset: patient-records
                  purpose: TRAINING
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyValidation'

  /api/v1/privacy/analyze:
    post:
      tags: [Privacy]
      summary: Analyze privacy
      description: Perform comprehensive privacy analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacyAnalysisRequest'
      responses:
        '200':
          description: Privacy analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyAnalysisResult'

  /api/v1/privacy/pii-detect:
    post:
      tags: [Privacy]
      summary: Detect PII
      description: Detect personally identifiable information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: PII detection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PIIDetectionResult'

  /api/v1/federated/query:
    post:
      tags: [Federated]
      summary: Execute federated query
      description: Execute SQL query on federated data source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FederatedQueryRequest'
      responses:
        '200':
          description: Query results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FederatedQueryResult'

  /api/v1/auth/oidc/callback:
    get:
      tags: [Auth]
      summary: OIDC callback
      description: OAuth2/OIDC callback endpoint
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'

  /api/v1/auth/mfa/setup:
    post:
      tags: [Auth]
      summary: Setup MFA
      description: Setup multi-factor authentication
      responses:
        '200':
          description: MFA setup information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFASetup'

  /api/v1/jit-access/request:
    post:
      tags: [JIT Access]
      summary: Request JIT access
      description: Request just-in-time access to resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JITAccessRequest'
      responses:
        '200':
          description: Access granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JITAccessGrant'

  /api/v1/break-glass/activate:
    post:
      tags: [Break-glass]
      summary: Activate break-glass
      description: Activate emergency break-glass access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BreakGlassRequest'
      responses:
        '200':
          description: Break-glass activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreakGlassSession'

  /oauth/authorize:
    get:
      tags: [OAuth]
      summary: OAuth2 authorization endpoint
      description: Initiate OAuth2 authorization code flow
      security: []
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code, token]
        - name: scope
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to authorization page

  /oauth/token:
    post:
      tags: [OAuth]
      summary: OAuth2 token endpoint
      description: Exchange authorization code for access token
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - grant_type
                - client_id
                - client_secret
              properties:
                grant_type:
                  type: string
                  enum: [authorization_code, refresh_token, client_credentials]
                code:
                  type: string
                redirect_uri:
                  type: string
                client_id:
                  type: string
                client_secret:
                  type: string
                refresh_token:
                  type: string
                scope:
                  type: string
      responses:
        '200':
          description: Access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenResponse'

  /oauth/refresh:
    post:
      tags: [OAuth]
      summary: Refresh OAuth2 token
      description: Refresh an expired access token
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - grant_type
                - refresh_token
                - client_id
                - client_secret
              properties:
                grant_type:
                  type: string
                  enum: [refresh_token]
                refresh_token:
                  type: string
                client_id:
                  type: string
                client_secret:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenResponse'

  /oauth/revoke:
    post:
      tags: [OAuth]
      summary: Revoke OAuth2 token
      description: Revoke an access or refresh token
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - token
                - client_id
                - client_secret
              properties:
                token:
                  type: string
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
                client_id:
                  type: string
                client_secret:
                  type: string
      responses:
        '200':
          description: Token revoked

  /oauth/introspect:
    post:
      tags: [OAuth]
      summary: Introspect OAuth2 token
      description: Get token metadata and validation status
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                token_type_hint:
                  type: string
      responses:
        '200':
          description: Token introspection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthIntrospectionResponse'

  /oidc/.well-known/openid-configuration:
    get:
      tags: [OAuth]
      summary: OIDC discovery endpoint
      description: OpenID Connect discovery metadata
      security: []
      responses:
        '200':
          description: OIDC configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCConfiguration'

  /oidc/userinfo:
    get:
      tags: [OAuth]
      summary: OIDC UserInfo endpoint
      description: Get authenticated user information
      responses:
        '200':
          description: User information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCUserInfo'

  /api/v1/executions:
    get:
      tags: [Executions]
      summary: List workflow executions
      description: Get list of workflow executions
      parameters:
        - name: workflowId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, RUNNING, COMPLETED, FAILED, CANCELLED]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of executions
          content:
            application/json:
              schema:
                type: object
                properties:
                  executions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Execution'
                  total:
                    type: integer

  /api/v1/executions/{executionId}:
    get:
      tags: [Executions]
      summary: Get execution details
      description: Get detailed information about a workflow execution
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Execution details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Execution'

  /api/v1/executions/{executionId}/cancel:
    post:
      tags: [Executions]
      summary: Cancel execution
      description: Cancel a running workflow execution
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Execution cancelled

  /api/v1/executions/{executionId}/retry:
    post:
      tags: [Executions]
      summary: Retry failed execution
      description: Retry a failed workflow execution
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Execution retried
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Execution'

  /api/v1/executions/{executionId}/logs:
    get:
      tags: [Executions]
      summary: Get execution logs
      description: Get logs for a workflow execution
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
            enum: [DEBUG, INFO, WARN, ERROR]
      responses:
        '200':
          description: Execution logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExecutionLog'

  /api/v1/ingestion/pipelines:
    get:
      tags: [Ingestion]
      summary: List ingestion pipelines
      description: Get list of data ingestion pipelines
      responses:
        '200':
          description: List of pipelines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IngestionPipeline'
    post:
      tags: [Ingestion]
      summary: Create ingestion pipeline
      description: Create a new data ingestion pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestionPipelineCreate'
      responses:
        '201':
          description: Pipeline created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionPipeline'

  /api/v1/ingestion/pipelines/{pipelineId}:
    get:
      tags: [Ingestion]
      summary: Get pipeline details
      parameters:
        - name: pipelineId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pipeline details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionPipeline'
    put:
      tags: [Ingestion]
      summary: Update pipeline
      parameters:
        - name: pipelineId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestionPipelineUpdate'
      responses:
        '200':
          description: Pipeline updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionPipeline'
    delete:
      tags: [Ingestion]
      summary: Delete pipeline
      parameters:
        - name: pipelineId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Pipeline deleted

  /api/v1/ingestion/pipelines/{pipelineId}/start:
    post:
      tags: [Ingestion]
      summary: Start pipeline
      description: Start data ingestion pipeline
      parameters:
        - name: pipelineId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pipeline started

  /api/v1/ingestion/pipelines/{pipelineId}/stop:
    post:
      tags: [Ingestion]
      summary: Stop pipeline
      description: Stop running ingestion pipeline
      parameters:
        - name: pipelineId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pipeline stopped

  /api/v1/ingestion/pipelines/{pipelineId}/metrics:
    get:
      tags: [Ingestion]
      summary: Get pipeline metrics
      description: Get ingestion pipeline performance metrics
      parameters:
        - name: pipelineId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pipeline metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionMetrics'

  /api/v1/watermarking/embed:
    post:
      tags: [Watermarking]
      summary: Embed watermark
      description: Embed digital watermark in dataset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatermarkEmbedRequest'
      responses:
        '200':
          description: Watermark embedded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatermarkResult'

  /api/v1/watermarking/detect:
    post:
      tags: [Watermarking]
      summary: Detect watermark
      description: Detect and verify watermark in dataset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatermarkDetectRequest'
      responses:
        '200':
          description: Watermark detection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatermarkDetectionResult'

  /api/v1/watermarking/verify:
    post:
      tags: [Watermarking]
      summary: Verify watermark integrity
      description: Verify watermark has not been tampered with
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - datasetId
                - watermarkId
              properties:
                datasetId:
                  type: string
                watermarkId:
                  type: string
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  confidence:
                    type: number
                  tamperedRegions:
                    type: array
                    items:
                      type: object

  /api/v1/teams:
    get:
      tags: [Teams]
      summary: List teams
      description: Get list of teams in organization
      responses:
        '200':
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Team'
    post:
      tags: [Teams]
      summary: Create team
      description: Create a new team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamCreate'
      responses:
        '201':
          description: Team created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'

  /api/v1/teams/{teamId}:
    get:
      tags: [Teams]
      summary: Get team details
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Team details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
    put:
      tags: [Teams]
      summary: Update team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamUpdate'
      responses:
        '200':
          description: Team updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
    delete:
      tags: [Teams]
      summary: Delete team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Team deleted

  /api/v1/teams/{teamId}/members:
    get:
      tags: [Teams]
      summary: List team members
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeamMember'
    post:
      tags: [Teams]
      summary: Add team member
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamMemberAdd'
      responses:
        '201':
          description: Member added

  /api/v1/teams/{teamId}/members/{userId}:
    delete:
      tags: [Teams]
      summary: Remove team member
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Member removed

  /api/v1/teams/{teamId}/roles:
    get:
      tags: [Teams]
      summary: List team roles
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeamRole'

  /api/v1/compliance/hipaa/audit:
    post:
      tags: [HIPAA]
      summary: HIPAA audit log
      description: Log HIPAA-compliant access event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HIPAAAuditLog'
      responses:
        '201':
          description: Audit log created

  /api/v1/compliance/hipaa/phi-access:
    get:
      tags: [HIPAA]
      summary: Get PHI access logs
      description: Retrieve Protected Health Information access logs
      parameters:
        - name: patientId
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: PHI access logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PHIAccessLog'

  /api/v1/compliance/hipaa/breach-notification:
    post:
      tags: [HIPAA]
      summary: HIPAA breach notification
      description: Submit HIPAA breach notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HIPAABreachNotification'
      responses:
        '201':
          description: Breach notification submitted


openapi: 3.0.3
info:
  title: Xase API
  description: |
    Xase - The Trust Layer for the AI Economy
    
    Secure, compliant, and privacy-preserving data access for AI training.
    
    ## Features
    - Policy-based access control
    - Privacy toolkit (k-anonymity, differential privacy, PII detection)
    - Federated query engine
    - JIT and break-glass access
    - Multi-factor authentication
    - Comprehensive audit trail
    
  version: 1.0.0
  contact:
    name: Xase Support
    email: support@xase.ai
    url: https://xase.ai
  license:
    name: Proprietary
    url: https://xase.ai/license

servers:
  - url: https://api.xase.ai
    description: Production
  - url: https://staging-api.xase.ai
    description: Staging
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
    description: Health check endpoints
  - name: Datasets
    description: Dataset management
  - name: Leases
    description: Access lease management
  - name: Policies
    description: Policy validation and management
  - name: Privacy
    description: Privacy analysis and PII detection
  - name: Federated
    description: Federated query execution
  - name: Auth
    description: Authentication and authorization
  - name: JIT Access
    description: Just-in-time access provisioning
  - name: Break-glass
    description: Emergency access
  - name: Billing
    description: Billing and invoicing
  - name: Compliance
    description: GDPR and regulatory compliance
  - name: Integrations
    description: Cloud storage integrations
  - name: Audit
    description: Audit log management
  - name: Analytics
    description: Analytics and metrics
  - name: Consent
    description: Consent management
  - name: Evidence
    description: Evidence bundles
  - name: GraphQL
    description: GraphQL API
  - name: Marketplace
    description: Data marketplace and offers
  - name: Notifications
    description: User notifications
  - name: Webhooks
    description: Webhook management
  - name: Usage
    description: Usage tracking and reporting
  - name: Tenants
    description: Tenant management
  - name: Users
    description: User management

security:
  - ApiKeyAuth: []
  - BearerAuth: []

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      description: Check API health status
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /api/v1/datasets:
    get:
      tags: [Datasets]
      summary: List datasets
      description: Get list of available datasets
      parameters:
        - name: tenantId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of datasets
          content:
            application/json:
              schema:
                type: object
                properties:
                  datasets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dataset'
                  total:
                    type: integer

  /api/v1/datasets/{datasetId}/stream:
    get:
      tags: [Datasets]
      summary: Stream dataset
      description: Stream dataset with policy enforcement
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
        - name: leaseId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Streaming response
          content:
            application/x-ndjson:
              schema:
                type: object

  /api/v1/leases:
    get:
      tags: [Leases]
      summary: List leases
      description: Get list of access leases
      responses:
        '200':
          description: List of leases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Lease'
    
    post:
      tags: [Leases]
      summary: Create lease
      description: Mint new access lease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaseRequest'
      responses:
        '201':
          description: Lease created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lease'

  /api/v1/policies/validate:
    post:
      tags: [Policies]
      summary: Validate policy
      description: Validate YAML policy
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: |
                apiVersion: xase.ai/v1
                kind: DataAccessPolicy
                metadata:
                  name: healthcare-training
                spec:
                  dataset: patient-records
                  purpose: TRAINING
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyValidation'

  /api/v1/privacy/analyze:
    post:
      tags: [Privacy]
      summary: Analyze privacy
      description: Perform comprehensive privacy analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacyAnalysisRequest'
      responses:
        '200':
          description: Privacy analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacyAnalysisResult'

  /api/v1/privacy/pii-detect:
    post:
      tags: [Privacy]
      summary: Detect PII
      description: Detect personally identifiable information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: PII detection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PIIDetectionResult'

  /api/v1/federated/query:
    post:
      tags: [Federated]
      summary: Execute federated query
      description: Execute SQL query on federated data source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FederatedQueryRequest'
      responses:
        '200':
          description: Query results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FederatedQueryResult'

  /api/v1/auth/oidc/callback:
    get:
      tags: [Auth]
      summary: OIDC callback
      description: OAuth2/OIDC callback endpoint
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'

  /api/v1/auth/mfa/setup:
    post:
      tags: [Auth]
      summary: Setup MFA
      description: Setup multi-factor authentication
      responses:
        '200':
          description: MFA setup information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFASetup'

  /api/v1/jit-access/request:
    post:
      tags: [JIT Access]
      summary: Request JIT access
      description: Request just-in-time access to resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JITAccessRequest'
      responses:
        '200':
          description: Access granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JITAccessGrant'

  /api/v1/break-glass/activate:
    post:
      tags: [Break-glass]
      summary: Activate break-glass
      description: Activate emergency break-glass access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BreakGlassRequest'
      responses:
        '200':
          description: Break-glass activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreakGlassSession'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Dataset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        tenantId:
          type: string
        createdAt:
          type: string
          format: date-time

    Lease:
      type: object
      properties:
        leaseId:
          type: string
        datasetId:
          type: string
        tenantId:
          type: string
        purpose:
          type: string
          enum: [TRAINING, INFERENCE, ANALYTICS]
        expiresAt:
          type: string
          format: date-time

    LeaseRequest:
      type: object
      required:
        - datasetId
        - purpose
      properties:
        datasetId:
          type: string
        purpose:
          type: string
          enum: [TRAINING, INFERENCE, ANALYTICS]
        duration:
          type: integer
          description: Duration in seconds

    PolicyValidation:
      type: object
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: string
        rewritePlan:
          type: object

    PrivacyAnalysisRequest:
      type: object
      required:
        - datasetId
      properties:
        datasetId:
          type: string
        quasiIdentifiers:
          type: array
          items:
            type: string
        k:
          type: integer
          default: 5

    PrivacyAnalysisResult:
      type: object
      properties:
        privacyScore:
          type: number
          minimum: 0
          maximum: 100
        kAnonymity:
          type: object
        differentialPrivacy:
          type: object
        piiDetection:
          type: object
        recommendations:
          type: array
          items:
            type: object

    PIIDetectionResult:
      type: object
      properties:
        findings:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              type:
                type: string
              confidence:
                type: number

    FederatedQueryRequest:
      type: object
      required:
        - dataSource
        - query
      properties:
        dataSource:
          type: string
        query:
          type: string

    FederatedQueryResult:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
        rowCount:
          type: integer
        executionTime:
          type: number

    AuthResult:
      type: object
      properties:
        sessionId:
          type: string
        user:
          type: object
        tokens:
          type: object

    MFASetup:
      type: object
      properties:
        secret:
          type: string
        qrCodeUrl:
          type: string
        backupCodes:
          type: array
          items:
            type: string

    JITAccessRequest:
      type: object
      required:
        - userId
        - tenantId
        - resourceType
        - resourceId
        - permissions
        - reason
      properties:
        userId:
          type: string
        tenantId:
          type: string
        resourceType:
          type: string
          enum: [DATASET, POLICY, LEASE, ADMIN]
        resourceId:
          type: string
        permissions:
          type: array
          items:
            type: string
        reason:
          type: string
        duration:
          type: integer
          default: 3600

    JITAccessGrant:
      type: object
      properties:
        grantId:
          type: string
        expiresAt:
          type: string
          format: date-time

    BreakGlassRequest:
      type: object
      required:
        - userId
        - tenantId
        - resourceType
        - resourceId
        - reason
      properties:
        userId:
          type: string
        tenantId:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
        reason:
          type: string
        severity:
          type: string
          enum: [CRITICAL, HIGH, MEDIUM]
          default: HIGH

    BreakGlassSession:
      type: object
      properties:
        sessionId:
          type: string
        expiresAt:
          type: string
          format: date-time

  # Additional endpoints
  /api/v1/datasets/{datasetId}:
    get:
      tags: [Datasets]
      summary: Get dataset details
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dataset details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
    
    put:
      tags: [Datasets]
      summary: Update dataset
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetUpdate'
      responses:
        '200':
          description: Dataset updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
    
    delete:
      tags: [Datasets]
      summary: Delete dataset
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Dataset deleted

  /api/v1/leases/{leaseId}:
    get:
      tags: [Leases]
      summary: Get lease details
      parameters:
        - name: leaseId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lease details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lease'
    
    delete:
      tags: [Leases]
      summary: Revoke lease
      parameters:
        - name: leaseId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Lease revoked

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: string
                  email:
                    type: string

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset email sent

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - password
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successful

  /api/auth/2fa/setup:
    post:
      tags: [Auth]
      summary: Setup 2FA
      responses:
        '200':
          description: 2FA setup information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFASetup'

  /api/auth/2fa/verify:
    post:
      tags: [Auth]
      summary: Verify 2FA code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  pattern: '^\d{6}$'
      responses:
        '200':
          description: Code verified

  /api/billing/invoices:
    get:
      tags: [Billing]
      summary: List invoices
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
                  total:
                    type: integer

  /api/compliance/gdpr/dsar:
    post:
      tags: [Compliance]
      summary: Submit GDPR data subject access request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - subjectId
              properties:
                subjectId:
                  type: string
                requestType:
                  type: string
                  enum: [ACCESS, ERASURE, PORTABILITY]
      responses:
        '201':
          description: DSAR submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                  status:
                    type: string

  /api/compliance/gdpr/breach:
    post:
      tags: [Compliance]
      summary: Report GDPR data breach
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - description
                - severity
              properties:
                description:
                  type: string
                severity:
                  type: string
                  enum: [LOW, MEDIUM, HIGH, CRITICAL]
                affectedRecords:
                  type: integer
      responses:
        '201':
          description: Breach reported
          content:
            application/json:
              schema:
                type: object
                properties:
                  breachId:
                    type: string
                  reportedAt:
                    type: string
                    format: date-time

  /api/cloud-integrations:
    get:
      tags: [Integrations]
      summary: List cloud integrations
      responses:
        '200':
          description: List of integrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CloudIntegration'
    
    post:
      tags: [Integrations]
      summary: Create cloud integration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudIntegrationCreate'
      responses:
        '201':
          description: Integration created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudIntegration'

  /api/cloud-integrations/{id}:
    get:
      tags: [Integrations]
      summary: Get integration details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Integration details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudIntegration'
    
    delete:
      tags: [Integrations]
      summary: Delete integration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Integration deleted

  /api/cloud-integrations/{id}/scan:
    post:
      tags: [Integrations]
      summary: Scan cloud storage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Scan initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  scanId:
                    type: string
                  status:
                    type: string

  /api/audit/export:
    get:
      tags: [Audit]
      summary: Export audit logs
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
        - name: format
          in: query
          schema:
            type: string
            enum: [JSON, CSV, PDF]
            default: JSON
      responses:
        '200':
          description: Audit logs export
          content:
            application/json:
              schema:
                type: object
            text/csv:
              schema:
                type: string
            application/pdf:
              schema:
                type: string
                format: binary

  /api/dashboard/metrics:
    get:
      tags: [Analytics]
      summary: Get dashboard metrics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [DAY, WEEK, MONTH, YEAR]
            default: WEEK
      responses:
        '200':
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardMetrics'

  /api/analytics/advanced:
    post:
      tags: [Analytics]
      summary: Run advanced analytics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - datasetId
                - analysisType
              properties:
                datasetId:
                  type: string
                analysisType:
                  type: string
                  enum: [STATISTICAL, QUALITY, BIAS, DRIFT]
                parameters:
                  type: object
      responses:
        '200':
          description: Analysis results
          content:
            application/json:
              schema:
                type: object

  /api/consent/revoke:
    post:
      tags: [Consent]
      summary: Revoke consent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - consentId
              properties:
                consentId:
                  type: string
                reason:
                  type: string
      responses:
        '200':
          description: Consent revoked

  /api/evidence/{bundleId}:
    get:
      tags: [Evidence]
      summary: Get evidence bundle
      parameters:
        - name: bundleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evidence bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceBundle'

  /api/graphql:
    post:
      tags: [GraphQL]
      summary: GraphQL endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                variables:
                  type: object
                operationName:
                  type: string
      responses:
        '200':
          description: GraphQL response
          content:
            application/json:
              schema:
                type: object

  /api/marketplace/offers:
    get:
      tags: [Marketplace]
      summary: List marketplace offers
      parameters:
        - name: dataType
          in: query
          schema:
            type: string
            enum: [AUDIO, IMAGE, VIDEO, TEXT, DICOM]
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
      responses:
        '200':
          description: List of offers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Offer'
    
    post:
      tags: [Marketplace]
      summary: Create marketplace offer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferCreate'
      responses:
        '201':
          description: Offer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offer'

  /api/marketplace/offers/{offerId}:
    get:
      tags: [Marketplace]
      summary: Get offer details
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Offer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offer'
    
    put:
      tags: [Marketplace]
      summary: Update offer
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferUpdate'
      responses:
        '200':
          description: Offer updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offer'
    
    delete:
      tags: [Marketplace]
      summary: Delete offer
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Offer deleted

  /api/marketplace/offers/{offerId}/negotiate:
    post:
      tags: [Marketplace]
      summary: Negotiate offer terms
      parameters:

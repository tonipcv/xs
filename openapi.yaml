components:
  schemas:
    DatasetUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        metadata:
          type: object

    Invoice:
      type: object
      properties:
        id:
          type: string
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [PENDING, PAID, FAILED]
        createdAt:
          type: string
          format: date-time

    CloudIntegration:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
          enum: [AWS, GCP, AZURE]
        status:
          type: string
          enum: [ACTIVE, INACTIVE, ERROR]
        createdAt:
          type: string
          format: date-time

    CloudIntegrationCreate:
      type: object
      required:
        - name
        - provider
        - credentials
      properties:
        name:
          type: string
        provider:
          type: string
          enum: [AWS, GCP, AZURE]
        credentials:
          type: object

    DashboardMetrics:
      type: object
      properties:
        totalDatasets:
          type: integer
        activeLeases:
          type: integer
        dataVolume:
          type: number
        apiCalls:
          type: integer
        complianceScore:
          type: number

    EvidenceBundle:
      type: object
      properties:
        bundleId:
          type: string
        datasetId:
          type: string
        leaseId:
          type: string
        evidence:
          type: object
        createdAt:
          type: string
          format: date-time

    Offer:
      type: object
      properties:
        id:
          type: string
        datasetId:
          type: string
        sellerId:
          type: string
        price:
          type: number
        currency:
          type: string
          default: USD
        dataType:
          type: string
          enum: [AUDIO, IMAGE, VIDEO, TEXT, DICOM]
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SOLD]
        createdAt:
          type: string
          format: date-time

    OfferCreate:
      type: object
      required:
        - datasetId
        - price
      properties:
        datasetId:
          type: string
        price:
          type: number
        currency:
          type: string
          default: USD
        terms:
          type: object

    OfferUpdate:
      type: object
      properties:
        price:
          type: number
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        terms:
          type: object

    AccessRequest:
      type: object
      properties:
        id:
          type: string
        requesterId:
          type: string
        datasetId:
          type: string
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        reason:
          type: string
        createdAt:
          type: string
          format: date-time

    AccessRequestCreate:
      type: object
      required:
        - datasetId
        - reason
      properties:
        datasetId:
          type: string
        reason:
          type: string
        requestedPermissions:
          type: array
          items:
            type: string

    Notification:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          type: string
          enum: [INFO, WARNING, ERROR, SUCCESS]
        title:
          type: string
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        active:
          type: boolean
        secret:
          type: string
        createdAt:
          type: string
          format: date-time

    WebhookCreate:
      type: object
      required:
        - url
        - events
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        secret:
          type: string

    WebhookUpdate:
      type: object
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        active:
          type: boolean

    UsageReport:
      type: object
      properties:
        period:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        metrics:
          type: object
          properties:
            apiCalls:
              type: integer
            dataTransferred:
              type: number
            activeLeases:
              type: integer
            costs:
              type: number

    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        plan:
          type: string
          enum: [FREE, STARTER, PRO, ENTERPRISE]
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, DELETED]
        createdAt:
          type: string
          format: date-time

    TenantCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        plan:
          type: string
          enum: [FREE, STARTER, PRO, ENTERPRISE]
          default: FREE

    TenantUpdate:
      type: object
      properties:
        name:
          type: string
        plan:
          type: string
          enum: [FREE, STARTER, PRO, ENTERPRISE]
        status:
          type: string
          enum: [ACTIVE, SUSPENDED]

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        tenantId:
          type: string
        role:
          type: string
          enum: [OWNER, ADMIN, VIEWER]
        createdAt:
          type: string
          format: date-time

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [OWNER, ADMIN, VIEWER]

    Policy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        rules:
          type: object
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PolicyCreate:
      type: object
      required:
        - name
        - rules
      properties:
        name:
          type: string
        description:
          type: string
        rules:
          type: object

    PolicyUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        rules:
          type: object
        active:
          type: boolean

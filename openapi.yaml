components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://api.xase.ai/oauth/authorize
          tokenUrl: https://api.xase.ai/oauth/token
          refreshUrl: https://api.xase.ai/oauth/refresh
          scopes:
            read:datasets: Read dataset information
            write:datasets: Create and modify datasets
            read:leases: Read lease information
            write:leases: Create and manage leases
            admin: Full administrative access
        clientCredentials:
          tokenUrl: https://api.xase.ai/oauth/token
          scopes:
            api:access: API access for service accounts

  schemas:
    Dataset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        tenantId:
          type: string
        createdAt:
          type: string
          format: date-time

    Lease:
      type: object
      properties:
        leaseId:
          type: string
        datasetId:
          type: string
        tenantId:
          type: string
        purpose:
          type: string
          enum: [TRAINING, INFERENCE, ANALYTICS]
        expiresAt:
          type: string
          format: date-time

    LeaseRequest:
      type: object
      required:
        - datasetId
        - purpose
      properties:
        datasetId:
          type: string
        purpose:
          type: string
          enum: [TRAINING, INFERENCE, ANALYTICS]
        duration:
          type: integer
          description: Duration in seconds

    PolicyValidation:
      type: object
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: string
        rewritePlan:
          type: object

    PrivacyAnalysisRequest:
      type: object
      required:
        - datasetId
      properties:
        datasetId:
          type: string
        quasiIdentifiers:
          type: array
          items:
            type: string
        k:
          type: integer
          default: 5

    PrivacyAnalysisResult:
      type: object
      properties:
        privacyScore:
          type: number
          minimum: 0
          maximum: 100
        kAnonymity:
          type: object
        differentialPrivacy:
          type: object
        piiDetection:
          type: object
        recommendations:
          type: array
          items:
            type: object

    PIIDetectionResult:
      type: object
      properties:
        findings:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              type:
                type: string
              confidence:
                type: number

    FederatedQueryRequest:
      type: object
      required:
        - dataSource
        - query
      properties:
        dataSource:
          type: string
        query:
          type: string

    FederatedQueryResult:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
        rowCount:
          type: integer
        executionTime:
          type: number

    AuthResult:
      type: object
      properties:
        sessionId:
          type: string
        user:
          type: object
        tokens:
          type: object

    MFASetup:
      type: object
      properties:
        secret:
          type: string
        qrCodeUrl:
          type: string
        backupCodes:
          type: array
          items:
            type: string

    JITAccessRequest:
      type: object
      required:
        - userId
        - tenantId
        - resourceType
        - resourceId
        - permissions
        - reason
      properties:
        userId:
          type: string
        tenantId:
          type: string
        resourceType:
          type: string
          enum: [DATASET, POLICY, LEASE, ADMIN]
        resourceId:
          type: string
        permissions:
          type: array
          items:
            type: string
        reason:
          type: string
        duration:
          type: integer
          default: 3600

    JITAccessGrant:
      type: object
      properties:
        grantId:
          type: string
        expiresAt:
          type: string
          format: date-time

    BreakGlassRequest:
      type: object
      required:
        - userId
        - tenantId
        - resourceType
        - resourceId
        - reason
      properties:
        userId:
          type: string
        tenantId:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
        reason:
          type: string
        severity:
          type: string
          enum: [CRITICAL, HIGH, MEDIUM]
          default: HIGH

    BreakGlassSession:
      type: object
      properties:
        sessionId:
          type: string
        expiresAt:
          type: string
          format: date-time

  # Additional endpoints
  /api/v1/datasets/{datasetId}:
    get:
      tags: [Datasets]
      summary: Get dataset details
      parameters:
        - name: datasetId
          in: path
          required: true

---
# Instructions for using Sealed Secrets:
# 
# 1. Install kubeseal CLI:
#    brew install kubeseal  # macOS
#    # or download from https://github.com/bitnami-labs/sealed-secrets/releases
#
# 2. Create a regular secret:
#    kubectl create secret generic database-credentials \
#      --from-literal=username=myuser \
#      --from-literal=password=mypassword \
#      --from-literal=host=postgres.example.com \
#      --from-literal=port=5432 \
#      --from-literal=database=xase \
#      --dry-run=client -o yaml > secret.yaml
#
# 3. Seal the secret:
#    kubeseal --format=yaml < secret.yaml > sealed-secret.yaml
#
# 4. Apply the sealed secret:
#    kubectl apply -f sealed-secret.yaml
#
# 5. The controller will automatically decrypt and create the actual secret
#
# 6. Use in pods via environment variables or volume mounts:
#    env:
#      - name: DATABASE_USERNAME
#        valueFrom:
#          secretKeyRef:
#            name: database-credentials
#            key: username

apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.contract.id }}-sidecar
  labels:
    app: xase-sidecar
    contract: {{ .Values.contract.id }}
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: metrics
  selector:
    app: xase-sidecar
    contract: {{ .Values.contract.id }}

# Xase Sidecar Helm Chart Values

# Contract configuration
contract:
  id: ""  # Set via --set contract.id=ctr_abc123
  apiKey: ""  # Set via --set contract.apiKey=xase_pk_...
  leaseId: ""  # Set via --set contract.leaseId=lease_...

# Xase Brain configuration
xase:
  baseUrl: "https://xase.ai"

# Sidecar configuration
sidecar:
  image:
    repository: xase/sidecar
    tag: "latest"
    pullPolicy: IfNotPresent
  
  resources:
    requests:
      memory: "100Gi"  # RAM cache
      cpu: "8"
    limits:
      memory: "120Gi"
      cpu: "16"
  
  # Storage configuration
  storage:
    bucketName: ""  # S3 bucket name
    bucketPrefix: ""  # Optional prefix
  
  # Hospital adaptation configuration
  ingestion:
    mode: "s3"  # s3|dicomweb|fhir|hybrid
    
    # DICOMweb PACS configuration (for mode: dicomweb or hybrid)
    dicomweb:
      enabled: false
      url: ""  # e.g., http://pacs.hospital.local:8080/dcm4chee-arc
      authToken: ""  # Optional: Bearer token or Basic auth
    
    # FHIR EHR configuration (for mode: fhir or hybrid)
    fhir:
      enabled: false
      url: ""  # e.g., http://fhir.hospital.local:8080/fhir
      authToken: ""  # Optional: Bearer token
    
    # Hybrid mode configuration
    hybrid:
      fallbackToS3: true  # Fallback to S3 if PACS/FHIR fails
  
  # Resilience configuration
  resilience:
    gracePeriodSeconds: 300  # 5 minutes before entering cache-only mode
  
  # Observability configuration
  metrics:
    enabled: true
    bindAddr: "0.0.0.0:9090"  # Prometheus metrics endpoint
    service:
      enabled: true
      port: 9090
      type: ClusterIP
  
  # Cache configuration
  cache:
    sizeGb: 100
  
  # Socket path
  socketPath: "/var/run/xase/sidecar.sock"
  
  # Data pipeline configuration
  pipeline:
    type: "audio"  # audio|dicom|fhir|text|timeseries|passthrough
    
    # DICOM pipeline settings
    dicom:
      stripTags: "PatientName,PatientID,InstitutionName"
      enableOCR: false
      enableNIfTI: false
    
    # FHIR pipeline settings
    fhir:
      redactPaths: ""  # Comma-separated JSONPath expressions
      dateShiftDays: 0
      enableNLP: false
    
    # Audio pipeline settings
    audio:
      f0ShiftSemitones: 0.0
      enableDiarization: false
      enableRedaction: false

# Training pod configuration
training:
  image:
    repository: pytorch/pytorch
    tag: "2.0-cuda11.8-cudnn8-runtime"
    pullPolicy: IfNotPresent
  
  command: []  # Override with your training script
  
  resources:
    requests:
      memory: "32Gi"
      cpu: "8"
      nvidia.com/gpu: "1"
    limits:
      memory: "64Gi"
      cpu: "16"
      nvidia.com/gpu: "1"

# Service account
serviceAccount:
  create: true
  name: "xase-sidecar"

# Pod security
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Autoscaling configuration
autoscaling:
  enabled: true
  minReplicas: 6
  maxReplicas: 30
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 70

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/xase_test
  NEXTAUTH_SECRET: test-secret-key
  NEXTAUTH_URL: http://localhost:3000

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Run TypeScript check
        run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm test
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sidecar
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            sidecar/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run tests
        run: cargo test --verbose
      
      - name: Run benchmarks
        run: cargo bench --no-run

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: xase_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup database
        run: |
          npm run db:migrate
          npx prisma generate
          npm run db:seed:test
      
      - name: Build Sidecar
        run: |
          cd sidecar
          cargo build --release
      
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/xase_test
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: tests/e2e/results/

  build-sidecar:
    name: Build Sidecar Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        if: ${{ github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Skip Docker Hub login (no credentials)
        if: ${{ github.event_name != 'pull_request' && (secrets.DOCKER_USERNAME == '' || secrets.DOCKER_PASSWORD == '' ) }}
        run: echo "DOCKER_USERNAME/DOCKER_PASSWORD not set; skipping Docker Hub login."
      
      - name: Build and push (with credentials)
        if: ${{ github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/build-push-action@v4
        with:
          context: ./sidecar
          push: true
          tags: xaseai/sidecar:${{ github.sha }},xaseai/sidecar:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build only (no push)
        if: ${{ github.event_name != 'pull_request' && (secrets.DOCKER_USERNAME == '' || secrets.DOCKER_PASSWORD == '' ) }}
        uses: docker/build-push-action@v4
        with:
          context: ./sidecar
          push: false
          tags: xaseai/sidecar:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: [lint, unit-tests, rust-tests, e2e-tests, build-sidecar]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name xase-staging --region us-west-2
      
      - name: Deploy to staging
        run: |
          helm upgrade --install xase-brain ./k8s/brain \
            --namespace staging \
            --set image.tag=${{ github.sha }} \
            --set env=staging
      
      - name: Run smoke tests
        run: npm run test:smoke -- --env=staging

  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: xase_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup database
        run: |
          npm run db:migrate
          npx prisma generate
      
      - name: Start dev server
        run: npm run dev &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/xase_test
          NODE_ENV: test
          SIDECAR_AUTH_BYPASS: '1'  # TEST ONLY - never set in production
      
      - name: Wait for server
        run: npx wait-on http://localhost:3000/api/health -t 60000
      
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      
      - name: Run k6 load tests
        run: |
          BASE_URL=http://localhost:3000 API_KEY=test_key SIDECAR_AUTH_BYPASS=1 k6 run --vus 50 --duration 2m --summary-export=summary.json tests/load/sidecar-stress.js
      
      - name: Upload k6 summary
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: summary.json

  deploy-production:
    name: Deploy to Production
    needs: [lint, unit-tests, rust-tests, e2e-tests, build-sidecar, load-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://xase.ai
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name xase-production --region us-west-2
      
      - name: Deploy to production
        run: |
          helm upgrade --install xase-brain ./k8s/brain \
            --namespace production \
            --set image.tag=${{ github.sha }} \
            --set env=production \
            --wait \
            --timeout 10m
      
      - name: Run smoke tests
        run: npm run test:smoke -- --env=production
      
      - name: Notify Slack (if webhook configured)
        if: ${{ always() && secrets.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@v3
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'

      - name: Skip Slack notify (no webhook configured)
        if: ${{ always() && (secrets.SLACK_WEBHOOK_URL == '' || secrets.SLACK_WEBHOOK_URL == null) }}
        run: echo "SLACK_WEBHOOK_URL not set; skipping Slack notification."

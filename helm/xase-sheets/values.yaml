# Default values for xase-sheets
replicaCount: 3

image:
  repository: xaseai/xase-sheets
  pullPolicy: IfNotPresent
  tag: "2.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/api/monitoring/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations: {}

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: api.xase.ai
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: xase-sheets-tls
      hosts:
        - api.xase.ai

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - xase-sheets
          topologyKey: kubernetes.io/hostname

# Environment variables
env:
  NODE_ENV: production
  LOG_LEVEL: info
  
# Database configuration
database:
  host: postgres.default.svc.cluster.local
  port: 5432
  name: xase_sheets
  ssl: true
  poolMin: 2
  poolMax: 10

# Redis configuration
redis:
  host: redis.default.svc.cluster.local
  port: 6379
  db: 0
  tls: true

# Stripe configuration
stripe:
  enabled: true
  webhookPath: /api/stripe/webhooks

# SMTP configuration
smtp:
  host: smtp.gmail.com
  port: 587
  secure: false
  from: noreply@xase.ai

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s

# Health checks
livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Secrets (use external secrets operator or sealed secrets in production)
secrets:
  databaseUrl: ""
  redisUrl: ""
  nextauthSecret: ""
  nextauthUrl: ""
  stripeSecretKey: ""
  stripeWebhookSecret: ""
  smtpUser: ""
  smtpPassword: ""
  auditSigningKey: ""

# ConfigMap
config:
  features:
    advancedAnalytics: true
    realTimeNotifications: true
    betaDashboard: false
  rateLimit:
    freeRequests: 10
    proRequests: 200
  backup:
    enabled: true
    schedule: "0 2 * * *"
    retention: 30
